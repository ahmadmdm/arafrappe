<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square - IdeaOrbit green -->
  <rect width="100" height="100" rx="14" fill="#1a7f37"/>
  <!-- Globe circles -->
  <circle cx="50" cy="50" r="30" stroke="white" stroke-width="2.5" fill="none" opacity="0.6"/>
  <ellipse cx="50" cy="50" rx="14" ry="30" stroke="white" stroke-width="2" fill="none" opacity="0.6"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="24" y1="36" x2="76" y2="36" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="64" x2="76" y2="64" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Arabic letter ع (Ayn) centered -->
  <text x="50" y="58" font-family="Arial, 'Simplified Arabic', sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">ع</text>
</svg>
